  /* ============ tokens ============ */
  :root {
    --ink:      #26303A;   /* charcoal — lines & text */

    --pencil:   #FFC81E;   /* HB pencil yellow — the one accent */
    --pencil-deep: #E8B200;
    --grid:     #D9E6F2;   /* Karopapier blue */

    --paper:    #FFFFFF;
    --given:    #F3F3F0;   /* fill of the pre-printed model square */
    --line:     #D5DAE0;   /* UI input borders */
    /* Schmuck — garden pastels (sticker fills, outline stays --ink) */
    --deko-green:  #BFE3B4;
    --deko-blue:   #BBDDF2;
    --deko-yellow: #FFE08A;
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    /* the desk is squared paper — the app lives in the child's notebook */
    background-color: var(--desk);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  .app {
    display: flex;
    align-items: flex-start;
    gap: 32px;
    padding: 32px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* ============ sidebar (parent UI) ============ */
  .sidebar {
    flex: 0 0 300px;
    position: sticky;
    top: 32px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 10px rgba(38, 48, 58, .06);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .brand svg { flex: 0 0 auto; }
  .brand h1 {
    font-family: "Pacifico", "Comic Neue", "Comic Sans MS", "Segoe Print", cursive;
    font-weight: 400;
    font-size: 34px;
    margin: 0;
    letter-spacing: .5px;
  }

  .field { margin-bottom: 14px; }
  .field > label, .field .field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--ink-soft);
    margin-bottom: 5px;
  }
  .field input, .field select {
    width: 100%;
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    padding: 8px 10px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
  }
  .field input:focus-visible, .field select:focus-visible,
  button:focus-visible {
    outline: 3px solid var(--pencil);
    outline-offset: 1px;
  }

  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  /* Vorlage picker — a sheet of stickers; the glyph is what the child practices.
     Native radios (hidden, still focusable) keep keyboard + reader semantics. */
  .tpl-cards {
    position: relative;   /* containing block for the hidden radios */
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .tpl-cards input[type="radio"] {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    pointer-events: none;
  }
  .tpl-card {
    --card-fill: var(--deko-yellow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    padding: 10px 6px 8px;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .tpl-card:hover { border-color: var(--ink-soft); transform: translateY(-1px); }
  .tpl-glyph {
    font-family: "Comic Neue", "Comic Sans MS", "Segoe Print", cursive;
    font-size: 21px;
    font-weight: 700;
    line-height: 1.25;
    padding: 1px 10px;
    background: var(--card-fill);
    border: 1.5px solid var(--ink);
    border-radius: 8px;
  }
  .tpl-name {
    font-size: 12px;
    line-height: 1.25;
    color: var(--ink);
  }
  /* picked = the sticker is applied: pastel fill + ink outline (yellow stays actions-only) */
  input:checked + .tpl-card {
    border-color: var(--ink);
    background: var(--card-fill);
  }
  input:checked + .tpl-card .tpl-glyph { background: var(--paper); }
  input:focus-visible + .tpl-card {
    outline: 3px solid var(--pencil);
    outline-offset: 1px;
  }

  .tpl-desc {
    font-size: 13px;
    color: var(--ink-soft);
    margin: -6px 0 16px;
    line-height: 1.45;
  }

  .divider { border: 0; border-top: 1px solid var(--line); margin: 18px 0; }

  /* the one loud thing in the sidebar — a fat yellow sticker you press */
  .btn-print {
    width: 100%;
    font: inherit;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    background: var(--pencil);
    border: 2px solid var(--ink);
    border-radius: 999px;
    padding: 12px;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--ink);
    transition: background .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  .btn-print:hover { background: var(--pencil-deep); transform: translateY(-1px); box-shadow: 0 3px 0 var(--ink); }
  .btn-print:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--ink); }

  .hint {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 12px 0 0;
    line-height: 1.5;
  }

  .deko-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .deko-check {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    cursor: pointer;
  }
  .deko-check input { accent-color: var(--pencil-deep); width: 16px; height: 16px; }
  .btn-dice {
    font: inherit;
    font-size: 13px;
    color: var(--ink);
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 6px 10px;
    cursor: pointer;
    transition: transform .15s ease, background .15s ease;
  }
  .btn-dice:hover:enabled { background: var(--deko-blue); transform: rotate(-2deg); }
  .btn-dice:disabled { opacity: .45; cursor: default; border-color: var(--line); }

  .warn {
    display: none;
    font-size: 13px;
    background: #FBEAE7;
    border: 1px solid #E4A69C;
    border-radius: 8px;
    padding: 9px 11px;
    margin-top: 12px;
    line-height: 1.45;
  }
  .warn.show { display: block; }

  /* ============ the sheet (child's world, true A4) ============ */
  .stage { flex: 1; min-width: 0; }

  .sheet-scaler { transform-origin: top left; }

  .sheet {
    position: relative;   /* anchor for the Schmuck layer */
    width: 210mm;
    /* 297mm A4 minus a 12mm reserve at the bottom: iOS Safari's AirPrint injects its
       own footer (site name + URL) into the physical printout with no way to disable
       it, and since the sheet always floors to a full page, that footer had nowhere
       to go but push the last sliver of content onto a second page. Same category as
       the printer-clip-zone safe-inset below, just sized for the OS footer band. */
    min-height: 285mm;
    padding: 12mm;
    background: var(--paper);
    box-shadow: 0 4px 24px rgba(38, 48, 58, .14);
    border-radius: 2px;
  }
  /* stacked multi-page preview — screen only, print paginates via break-after instead */
  @media screen {
    .sheet + .sheet { margin-top: 10mm; }
  }

  /* Schmuck — decoration layer, always behind and out of the content flow */
  .deko {
    position: absolute;
    inset: 0;
    pointer-events: none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .deko-footer {
    position: absolute;
    left: 12mm;
    bottom: 7mm;
    width: 186mm;
  }
  .deko-title-motif { flex: 0 0 auto; }

  .sheet-head {
    display: flex;
    align-items: flex-end;
    gap: 12mm;
    font-family: "Comic Neue", "Comic Sans MS", "Segoe Print", cursive;
    font-size: 13pt;
  }
  .write-line {
    display: flex;
    align-items: flex-end;
    gap: 3mm;
  }
  .write-line .rule {
    border-bottom: 0.4mm solid var(--ink);
    height: 9mm;
  }
  .write-name { flex: 1; }
  .write-name .rule { flex: 1; }
  .write-date .rule { width: 42mm; }

  .sheet-title {
    font-family: "Comic Neue", "Comic Sans MS", "Segoe Print", cursive;
    font-size: 21pt;
    text-align: center;
    margin: 7mm 0 8mm;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4mm;
  }

  /* rows of Kästchen — friendly rounded strips, shared inner borders */
  .rows { display: flex; flex-direction: column; align-items: center; }
  .row  { display: flex; }
  .cell {
    border: 0.3mm solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Comic Neue", "Comic Sans MS", "Segoe Print", cursive;
  }
  .cell + .cell { border-left: none; }
  .row .cell:first-child { border-radius: 1.5mm 0 0 1.5mm; }
  .row .cell:last-child  { border-radius: 0 1.5mm 1.5mm 0; }
  .cell-model {
    background: var(--given);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Rechenaufgaben — 2-spaltiges Raster, Ergebnis-Kästchen bündig rechts */
  .aufgaben {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 16mm;
    row-gap: 6mm;
  }
  .aufgabe {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4mm;
    font-family: "Comic Neue", "Comic Sans MS", "Segoe Print", cursive;
    font-size: 9mm;
    white-space: nowrap;
  }
  .aufgabe .cell { border-radius: 1.5mm; }

  /* ============ print ============ */
  @page { size: A4 portrait; margin: 0; }

  @media print {
    body { background: none; }
    .app { display: block; padding: 0; max-width: none; }
    .sidebar { display: none; }
    .sheet-scaler { transform: none !important; height: auto !important; }
    .sheet { box-shadow: none; border-radius: 0; margin: 0; }
    /* each sheet is its own physical page; no break after the last one */
    .sheet:not(:last-child) { break-after: page; page-break-after: always; }
  }

  /* ============ micro-moments (screen only, motion-safe) ============ */
  @media screen and (prefers-reduced-motion: no-preference) {
    .sheet { animation: sheet-settle .3s ease-out; }
    @keyframes sheet-settle {
      from { opacity: 0; transform: translateY(3px); }
    }
    input:checked + .tpl-card { animation: card-pop .25s ease; }
    @keyframes card-pop {
      50% { transform: scale(1.05); }
    }
    .btn-dice.rolling { animation: dice-roll .45s ease; }
    @keyframes dice-roll {
      25% { transform: rotate(-14deg); }
      60% { transform: rotate(10deg); }
    }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  /* ============ phone (parent prints from the iPhone) ============ */
  @media screen and (max-width: 800px) {
    .app {
      flex-direction: column;   /* controls first, sheet below */
      align-items: stretch;     /* let the stage take the viewport width, not the A4 width */
      gap: 20px;
      padding: 16px;
    }
    .sidebar {
      position: static;
      flex: 0 0 auto;
      width: 100%;
    }
    /* the scaled A4 keeps its layout width — clip it so the page can't pan sideways */
    .stage { overflow-x: hidden; }
    /* touch sizing; 16px inputs also stop iOS focus-zoom */
    .field input, .field select { font-size: 16px; padding: 11px 12px; }
    .tpl-card { min-height: 72px; }
    .btn-dice { padding: 12px 14px; }
    .btn-print { padding: 14px; }
    .deko-check input { width: 20px; height: 20px; }
  }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <!-- pencil mark -->
      <svg width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
        <circle cx="15" cy="15" r="14" fill="var(--pencil)"/>
        <path d="M9.5 20.5 L10.5 16.5 L18.5 8.5 L22 12 L14 20 L9.5 20.5 Z"
              fill="none" stroke="var(--ink)" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
      <h1>Blattwerk</h1>
    </div>

    <div class="field">
      <span class="field-label" id="tpl-label">Vorlage</span>
      <div class="tpl-cards" id="tpl-cards" role="radiogroup" aria-labelledby="tpl-label"></div>
    </div>
    <p class="tpl-desc" id="tpl-desc"></p>

    <div id="opts"><!-- per-template options render here --></div>

    <hr class="divider">

    <div class="deko-bar">
      <label class="deko-check"><input type="checkbox" id="deko-on"> Schmuck</label>
      <button class="btn-dice" id="dice" title="Schmuck und Aufgaben neu würfeln">🎲 Neu würfeln</button>
    </div>

    <hr class="divider">

    <div class="field">
      <label for="pages">Anzahl Blätter</label>
      <input type="number" id="pages" min="1" max="20">
    </div>

    <button class="btn-print" id="print">Drucken</button>
    <p class="hint">Tipp: Im Druckdialog „Kopf- und Fußzeilen“ ausschalten, dann bleibt das Blatt sauber.</p>
    <div class="warn" id="warn">Passt nicht auf eine Seite — weniger Zeilen oder kleinere Kästchen wählen.</div>
  </aside>

  <main class="stage">
    <div class="sheet-scaler" id="scaler"><!-- rendered worksheets --></div>
  </main>

</div>

<script>
"use strict";

/* ============ geometry (mm) ============ */
const PAGE = { w: 210, h: 297, pad: 12 };
const CTX  = { widthMm: PAGE.w - 2 * PAGE.pad, heightMm: PAGE.h - 2 * PAGE.pad };

/* ============ Schmuck (decoration layer) ============
   Shell-owned, template-agnostic. A seeded roll picks one of four
   hand-designed footer patterns (Wiese, Girlande, Ecke, Streu) and fills
   its slots from the motif pool; sometimes one tiny motif joins the title.
   Same seed → same sheet. The decoration yields to the exercise —
   it can never push content to page 2 or trigger the overflow warning. */

const INK = "#26303A";
const PASTELS = (() => {
  const css = getComputedStyle(document.documentElement);
  return {
    green:  css.getPropertyValue("--deko-green").trim(),
    blue:   css.getPropertyValue("--deko-blue").trim(),
    yellow: css.getPropertyValue("--deko-yellow").trim(),
  };
})();

/* deterministic PRNG — same seed, same decoration */
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a = (a + 0x6D2B79F5) >>> 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const S = (sw) => `stroke="${INK}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"`;

/* motif pool — 24×24 boxes, sticker look: pastel fill + ink outline */
const MOTIFS = [
  { id: "blatt", fills: ["green"], draw: (f, sw) =>
      `<path d="M12 2.5 C18.5 7 19.5 15 12 21.5 C4.5 15 5.5 7 12 2.5 Z" fill="${f}" ${S(sw)}/>` +
      `<path d="M12 6.5 V18" fill="none" ${S(sw)}/>` },
  { id: "sproessling", fills: ["green"], draw: (f, sw) =>
      `<path d="M12 21.5 V10.5" fill="none" ${S(sw)}/>` +
      `<path d="M12 10.5 C6.5 10.5 3.8 6.2 4.8 2.5 C10 3.5 12 6.8 12 10.5 Z" fill="${f}" ${S(sw)}/>` +
      `<path d="M12 13 C16.2 13 18.3 9.7 17.6 6.8 C13.6 7.6 12 10 12 13 Z" fill="${f}" ${S(sw)}/>` },
  { id: "blume", fills: ["blue", "yellow"], draw: (f, sw) => {
      let p = "";
      for (let i = 0; i < 5; i++) {
        const a = -Math.PI / 2 + i * 2 * Math.PI / 5;
        p += `<circle cx="${(12 + 5.2 * Math.cos(a)).toFixed(2)}" cy="${(12 + 5.2 * Math.sin(a)).toFixed(2)}" r="3.7" fill="${f}" ${S(sw)}/>`;
      }
      return p + `<circle cx="12" cy="12" r="2.7" fill="${f === PASTELS.yellow ? PASTELS.blue : PASTELS.yellow}" ${S(sw)}/>`;
    } },
  { id: "tulpe", fills: ["yellow", "blue"], draw: (f, sw) =>
      `<path d="M12 14.5 V21.5" fill="none" ${S(sw)}/>` +
      `<path d="M12 18.6 C9.2 18.6 7.4 16.8 7 14.4" fill="none" ${S(sw)}/>` +
      `<path d="M6.8 4.2 V9.5 a5.2 5.2 0 0 0 10.4 0 V4.2 C15.5 6.6 13.9 6.7 12.9 4.6 Q12 6.6 11.1 4.6 C10.1 6.7 8.5 6.6 6.8 4.2 Z" fill="${f}" ${S(sw)}/>` },
  { id: "stern", fills: ["yellow"], draw: (f, sw) =>
      `<path d="M12 2 L14.9 8.3 L21.8 8.9 L16.6 13.5 L18.1 20.3 L12 16.7 L5.9 20.3 L7.4 13.5 L2.2 8.9 L9.1 8.3 Z" fill="${f}" ${S(sw)}/>` },
  { id: "sonne", fills: ["yellow"], draw: (f, sw) => {
      let d = "";
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4 + Math.PI / 8;
        d += `M${(12 + 6.8 * Math.cos(a)).toFixed(1)} ${(12 + 6.8 * Math.sin(a)).toFixed(1)} L${(12 + 9.4 * Math.cos(a)).toFixed(1)} ${(12 + 9.4 * Math.sin(a)).toFixed(1)} `;
      }
      return `<circle cx="12" cy="12" r="4.8" fill="${f}" ${S(sw)}/><path d="${d}" fill="none" ${S(sw)}/>`;
    } },
  { id: "wolke", fills: ["blue"], draw: (f, sw) =>
      `<path d="M5 17.5 C2.6 17.5 1.5 15.8 1.5 14.2 C1.5 12.4 3 11.2 4.6 11.2 C4.9 8.1 7.4 6 10.3 6 C13 6 15.2 7.8 15.9 10.3 C18.4 10.3 20.5 11.9 20.5 14 C20.5 15.9 19 17.5 16.8 17.5 Z" fill="${f}" ${S(sw)}/>` },
  { id: "pilz", fills: ["yellow", "blue", "green"], draw: (f, sw) =>
      `<path d="M9.7 12.8 c.4 2.8 -.3 5.2 -1 6.9 a8.5 8.5 0 0 0 6.6 0 c-.7 -1.7 -1.4 -4.1 -1 -6.9 Z" fill="#FFFFFF" ${S(sw)}/>` +
      `<path d="M3.6 12.8 C3.6 7.2 7.4 3.4 12 3.4 s8.4 3.8 8.4 9.4 Z" fill="${f}" ${S(sw)}/>` +
      `<circle cx="8.3" cy="8.6" r="1.35" fill="#FFFFFF"/>` +
      `<circle cx="13.2" cy="6.4" r="1.1" fill="#FFFFFF"/>` +
      `<circle cx="15.9" cy="9.8" r="1.25" fill="#FFFFFF"/>` },
  { id: "schnecke", fills: ["yellow", "blue", "green"], draw: (f, sw) =>
      `<path d="M2.8 19.8 c0 -3.4 2.3 -5.6 4.9 -5.2" fill="none" ${S(sw)}/>` +
      `<path d="M5.4 14.9 L4.2 12.2 M7 14.6 L7.3 11.8" fill="none" ${S(sw)}/>` +
      `<circle cx="4.2" cy="11.9" r=".8" fill="${INK}"/><circle cx="7.4" cy="11.5" r=".8" fill="${INK}"/>` +
      `<circle cx="14.2" cy="14" r="5.8" fill="${f}" ${S(sw)}/>` +
      `<path d="M14.2 14 a2.3 2.3 0 0 1 2.3 2.3 A4.2 4.2 0 0 1 10 14.6" fill="none" ${S(sw)}/>` +
      `<path d="M2.8 19.8 H19.2" fill="none" ${S(sw)}/>` },
  { id: "stift", fills: ["yellow"], draw: (f, sw) =>
      `<path d="M3.8 20.2 L5.2 14.9 L16.1 4 A2.7 2.7 0 0 1 19.9 7.8 L9 18.7 L3.8 20.2 Z" fill="${f}" ${S(sw)}/>` +
      `<path d="M5.2 14.9 L9 18.7" fill="none" ${S(sw)}/>` +
      `<path d="M3.8 20.2 L4.4 17.9 L6.1 19.6 Z" fill="${INK}" ${S(sw)}/>` },
  { id: "herz", fills: ["yellow", "blue", "green"], draw: (f, sw) =>
      `<path d="M12 20.5 C5.2 15.5 3.6 10.9 6.2 8.2 a4.1 4.1 0 0 1 5.8 .2 a4.1 4.1 0 0 1 5.8 -.2 c2.6 2.7 1 7.3 -5.8 12.3 Z" fill="${f}" ${S(sw)}/>` },
  { id: "schmetterling", fills: ["yellow", "blue", "green"], draw: (f, sw) =>
      `<ellipse cx="6.6" cy="9.4" rx="4.1" ry="3.2" transform="rotate(-28 6.6 9.4)" fill="${f}" ${S(sw)}/>` +
      `<ellipse cx="17.4" cy="9.4" rx="4.1" ry="3.2" transform="rotate(28 17.4 9.4)" fill="${f}" ${S(sw)}/>` +
      `<ellipse cx="7.9" cy="15.8" rx="2.8" ry="2.3" transform="rotate(22 7.9 15.8)" fill="${f}" ${S(sw)}/>` +
      `<ellipse cx="16.1" cy="15.8" rx="2.8" ry="2.3" transform="rotate(-22 16.1 15.8)" fill="${f}" ${S(sw)}/>` +
      `<path d="M12 7.2 V18.8 M12 7.2 L9.6 3.8 M12 7.2 L14.4 3.8" fill="none" ${S(sw)}/>` +
      `<circle cx="9.4" cy="3.6" r=".8" fill="${INK}"/><circle cx="14.6" cy="3.6" r=".8" fill="${INK}"/>` },
];

function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }
function pickDistinct(rng, n) {
  const pool = MOTIFS.slice(), out = [];
  for (let i = 0; i < n && pool.length; i++) out.push(pool.splice(Math.floor(rng() * pool.length), 1)[0]);
  return out;
}
function motifMarkup(rng, m, sw) { return m.draw(PASTELS[pick(rng, m.fills)], sw); }
const clampMm = (v, min, max) => Math.min(max, Math.max(min, v));

/* place a motif in footer coords (mm); stroke stays ≈0.42 mm at any size */
function placed(rng, m, x, y, size, rot, anchor) {
  const s = size / 24;
  const sw = Math.round((0.42 / s) * 100) / 100;
  const tx = x - 12 * s;
  const ty = anchor === "bottom" ? y - 24 * s : y - 12 * s;
  return `<g transform="translate(${tx.toFixed(2)} ${ty.toFixed(2)}) scale(${s.toFixed(3)}) rotate(${rot.toFixed(1)} 12 12)">${motifMarkup(rng, m, sw)}</g>`;
}

/* the four layout patterns — composed randomness, no chaotic rolls */
function wiese(rng, W, H) {
  const gy = H - 1.2, k = H / 22;
  let d = `M2 ${gy}`;
  for (let x = 2; x < W - 4; x += 22.75) d += ` q 11.4 ${(rng() * 1.6 - 0.8).toFixed(2)} 22.75 0`;
  let out = `<path d="${d}" fill="none" ${S(0.4)}/>`;
  const n = 4 + Math.floor(rng() * 3);
  const slot = (W - 8) / n;
  const ms = pickDistinct(rng, n);
  for (let i = 0; i < n; i++) {
    const x = 4 + slot * i + slot * (0.25 + 0.5 * rng());
    out += placed(rng, ms[i], x, gy + 0.2, (9 + rng() * 4) * k, rng() * 14 - 7, "bottom");
  }
  return out;
}
function girlande(rng, W, H) {
  const x0 = 7, x1 = W - 7, cx = W / 2, cy = H + 3;
  let out = `<path d="M${x0} 3.2 Q ${cx} ${cy} ${x1} 3.2" fill="none" ${S(0.4)} stroke-dasharray="0.1 1.7"/>`;
  const n = 5 + Math.floor(rng() * 3);
  const ms = pickDistinct(rng, n);
  for (let i = 0; i < n; i++) {
    const t = (i + 0.5) / n, u = 1 - t;
    const x = u * u * x0 + 2 * u * t * cx + t * t * x1;
    const y = u * u * 3.2 + 2 * u * t * cy + t * t * 3.2;
    out += placed(rng, ms[i], x, y, (6 + rng() * 2.5) * (H / 22), rng() * 20 - 10, "center");
  }
  return out;
}
function ecke(rng, W, H) {
  const left = rng() < 0.5, gy = H - 1.2, k = H / 22, dir = left ? 1 : -1;
  let x = left ? 8 : W - 8;
  let out = "";
  const n = 3 + (rng() < 0.5 ? 1 : 0);
  const ms = pickDistinct(rng, n);
  let size = 13 * k;
  for (let i = 0; i < n; i++) {
    out += placed(rng, ms[i], x, gy + 0.2, size, rng() * 12 - 6, "bottom");
    x += dir * (size * 0.62 + 2);
    size *= 0.76;
  }
  return out;
}
function streu(rng, W, H) {
  let out = "";
  const ms = pickDistinct(rng, 3);
  for (let i = 0; i < 3; i++) {
    const x = clampMm(16 + i * ((W - 32) / 2) + (rng() * 26 - 13), 8, W - 8);
    const y = 5.5 + rng() * (H - 11);
    out += placed(rng, ms[i], x, y, (6 + rng() * 2) * (H / 22), rng() * 24 - 12, "center");
  }
  for (let i = 0; i < 4; i++) {
    const x = 6 + rng() * (W - 12), y = 3.5 + rng() * (H - 7);
    out += `<path transform="translate(${x.toFixed(1)} ${y.toFixed(1)})" d="M0 -1.7 L0.45 -0.45 L1.7 0 L0.45 0.45 L0 1.7 L-0.45 0.45 L-1.7 0 L-0.45 -0.45 Z" fill="${INK}"/>`;
  }
  return out;
}
const PATTERNS = [wiese, girlande, ecke, streu];

function renderDeko(sheet, rng) {
  if (!dekoOn) return;
  const rect = sheet.getBoundingClientRect();
  const pxPerMm = rect.width / PAGE.w;
  const contentBottom = (sheet.lastElementChild.getBoundingClientRect().bottom - rect.top) / pxPerMm;

  // fixed draw order: the roll stays stable while the footer adapts to content
  const pattern = pick(rng, PATTERNS);
  const wantTitleMotif = rng() < 0.55;
  const titleLeft = rng() < 0.5;
  const titleMotif = pick(rng, MOTIFS);

  // the footer yields: full (22 mm) → compact (15 mm) → none
  let h = 0;
  if (contentBottom <= 264) h = 22;
  else if (contentBottom <= 271) h = 15;

  const layer = el("div", "deko");
  if (h) {
    layer.innerHTML =
      `<svg class="deko-footer" style="height:${h}mm" viewBox="0 0 186 ${h}" xmlns="http://www.w3.org/2000/svg">` +
      pattern(rng, 186, h) + `</svg>`;
  }
  sheet.appendChild(layer);

  const title = sheet.querySelector(".sheet-title");
  if (wantTitleMotif && title) {
    const span = el("span", "deko-title-motif");
    span.innerHTML = `<svg width="7mm" height="7mm" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${motifMarkup(rng, titleMotif, 1.6)}</svg>`;
    title[titleLeft ? "prepend" : "append"](span);
  }
}

/* ============ template registry ============
   A template is one declarative object:
     name / glyph / description — shown in the picker (glyph: short Comic-Neue
                           sample of what the child practices, e.g. "123")
     options[]           — rendered generically by the shell
     random              — true if render draws from ctx.rng (keeps 🎲 enabled)
     render(opts, ctx)   — returns the sheet body as a DOM node
   ctx.rng is a seeded PRNG sharing the 🎲 roll with the Schmuck layer:
   same seed → same sheet, 🎲 re-rolls Aufgaben and Schmuck together.
   The shell owns the header (Name / Datum / Titel) and printing.
   Adding a worksheet type = adding one entry here.               */
const TEMPLATES = {
  zahlen: {
    name: "Zahlen schreiben",
    glyph: "123",
    description: "Eine Zeile pro Zahl: die Zahl steht im ersten Kästchen, der Rest der Zeile bleibt zum Üben frei.",
    options: [
      { key: "title", label: "Titel",  type: "text",   default: "Zahlen schreiben" },
      { key: "from",  label: "Von",    type: "number", default: 1,  min: 0, max: 99 },
      { key: "to",    label: "Bis",    type: "number", default: 10, min: 0, max: 99 },
      { key: "cell",  label: "Kästchen", type: "select", default: "15", choices: [
          { value: "15", label: "Groß (1,5 cm)" },
          { value: "12", label: "Mittel (1,2 cm)" },
          { value: "10", label: "Klein (1,0 cm)" },
      ]},
    ],
    render(o, ctx) {
      const cell = parseFloat(o.cell);
      const cols = Math.floor(ctx.widthMm / cell);
      const from = Math.min(o.from, o.to);
      const to   = Math.max(o.from, o.to);
      const rows = el("div", "rows");
      rows.style.gap = "4mm";
      for (let n = from; n <= to; n++) {
        const row = el("div", "row");
        for (let i = 0; i < cols; i++) {
          const c = el("div", "cell" + (i === 0 ? " cell-model" : ""));
          c.style.width = c.style.height = cell + "mm";
          if (i === 0) {
            c.textContent = n;
            c.style.fontSize = (cell * 0.58) + "mm";
          }
          row.appendChild(c);
        }
        rows.appendChild(row);
      }
      return rows;
    },
  },

  buchstaben: {
    name: "Buchstaben schreiben",
    glyph: "ABC",
    description: "Eine Zeile pro Buchstabe: 10 zufällige Großbuchstaben, im ersten Kästchen vorgegeben, der Rest der Zeile bleibt zum Üben frei.",
    random: true,
    options: [
      { key: "title", label: "Titel",  type: "text",   default: "Buchstaben schreiben" },
      { key: "cell",  label: "Kästchen", type: "select", default: "15", choices: [
          { value: "15", label: "Groß (1,5 cm)" },
          { value: "12", label: "Mittel (1,2 cm)" },
          { value: "10", label: "Klein (1,0 cm)" },
      ]},
    ],
    render(o, ctx) {
      const rng = ctx.rng;
      // seeded partial Fisher–Yates: 10 distinct letters from the 26-letter Grundalphabet
      const pool = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
      for (let i = 0; i < 10; i++) {
        const j = i + Math.floor(rng() * (pool.length - i));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      const letters = pool.slice(0, 10);

      const cell = parseFloat(o.cell);
      const cols = Math.floor(ctx.widthMm / cell);
      const rows = el("div", "rows");
      rows.style.gap = "4mm";
      for (const letter of letters) {
        const row = el("div", "row");
        for (let i = 0; i < cols; i++) {
          const c = el("div", "cell" + (i === 0 ? " cell-model" : ""));
          c.style.width = c.style.height = cell + "mm";
          if (i === 0) {
            c.textContent = letter;
            c.style.fontSize = (cell * 0.58) + "mm";
          }
          row.appendChild(c);
        }
        rows.appendChild(row);
      }
      return rows;
    },
  },

  mathe1: {
    name: "Vorschule Mathe I",
    glyph: "8+9",
    description: "20 Plus- und Minus-Aufgaben im Zahlenraum bis 20 — fünf davon mit Ergebnis über 10, der Rest bleibt fingerzählbar.",
    random: true,
    options: [
      { key: "title", label: "Titel", type: "text", default: "Vorschule Mathe I" },
    ],
    render(o, ctx) {
      const rng = ctx.rng;
      // Aufgaben pools — easy lives fully in 0–10, hard has Ergebnis 11–20;
      // operands ≥ 1, minus never negative (Ergebnis 0 allowed)
      const easyPlus = [], easyMinus = [], hardPlus = [], hardMinus = [];
      for (let a = 1; a <= 9; a++)
        for (let b = 1; a + b <= 10; b++) easyPlus.push([a, "+", b]);
      for (let a = 1; a <= 10; a++)
        for (let b = 1; b <= a; b++) easyMinus.push([a, "−", b]);
      for (let a = 1; a <= 19; a++)
        for (let b = Math.max(1, 11 - a); a + b <= 20; b++) hardPlus.push([a, "+", b]);
      for (let a = 12; a <= 20; a++)
        for (let b = 1; a - b >= 11; b++) hardMinus.push([a, "−", b]);

      // seeded partial Fisher–Yates: draw n distinct Aufgaben from a pool
      const draw = (pool, n) => {
        for (let i = 0; i < n; i++) {
          const j = i + Math.floor(rng() * (pool.length - i));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool.slice(0, n);
      };

      // 5 hard with random +/− split; totals stay 10 plus / 10 minus
      const nHardPlus = Math.floor(rng() * 6);
      const tasks = [
        ...draw(hardPlus, nHardPlus),
        ...draw(hardMinus, 5 - nHardPlus),
        ...draw(easyPlus, 10 - nHardPlus),
        ...draw(easyMinus, 5 + nHardPlus),
      ];
      draw(tasks, tasks.length); // shuffle positions

      const grid = el("div", "aufgaben");
      for (const [a, op, b] of tasks) {
        const item = el("div", "aufgabe");
        item.appendChild(Object.assign(el("span"), { textContent: `${a} ${op} ${b} =` }));
        const box = el("div", "cell");
        box.style.width = box.style.height = "15mm";
        item.appendChild(box);
        grid.appendChild(item);
      }
      return grid;
    },
  },

  mathe0: {
    name: "Vorschule Mathe 0",
    glyph: "2+3",
    description: "20 Plus- und Minus-Aufgaben im Zahlenraum bis 10 — alle Aufgaben gleich schwer.",
    random: true,
    options: [
      { key: "title", label: "Titel", type: "text", default: "Vorschule Mathe 0" },
    ],
    render(o, ctx) {
      const rng = ctx.rng;
      // Aufgaben pools — fully inside 0–10 (a, b, c all ≤ 10), single difficulty tier;
      // operands ≥ 1, minus never negative (Ergebnis 0 allowed)
      const plusPool = [], minusPool = [];
      for (let a = 1; a <= 9; a++)
        for (let b = 1; a + b <= 10; b++) plusPool.push([a, "+", b]);
      for (let a = 1; a <= 10; a++)
        for (let b = 1; b <= a; b++) minusPool.push([a, "−", b]);

      // seeded partial Fisher–Yates: draw n distinct Aufgaben from a pool
      const draw = (pool, n) => {
        for (let i = 0; i < n; i++) {
          const j = i + Math.floor(rng() * (pool.length - i));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool.slice(0, n);
      };

      // fixed 10 plus / 10 minus
      const tasks = [...draw(plusPool, 10), ...draw(minusPool, 10)];
      draw(tasks, tasks.length); // shuffle positions

      const grid = el("div", "aufgaben");
      for (const [a, op, b] of tasks) {
        const item = el("div", "aufgabe");
        item.appendChild(Object.assign(el("span"), { textContent: `${a} ${op} ${b} =` }));
        const box = el("div", "cell");
        box.style.width = box.style.height = "15mm";
        item.appendChild(box);
        grid.appendChild(item);
      }
      return grid;
    },
  },
};

/* ============ shell ============ */
const $ = (id) => document.getElementById(id);
function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }

let activeTpl = localStorage.getItem("blattwerk:tpl") || "zahlen";
if (!TEMPLATES[activeTpl]) activeTpl = "zahlen";

/* Schmuck state — the roll survives reloads; option edits keep it */
let dekoOn = localStorage.getItem("blattwerk:deko") !== "0";
let dekoSeed = parseInt(localStorage.getItem("blattwerk:dekoSeed"), 10);
if (!Number.isFinite(dekoSeed)) rollDeko();
function rollDeko() {
  dekoSeed = Math.floor(Math.random() * 4294967296);
  localStorage.setItem("blattwerk:dekoSeed", dekoSeed);
}

/* Anzahl Blätter — shell-owned like Schmuck, applies to every Vorlage */
let pageCount = parseInt(localStorage.getItem("blattwerk:pages"), 10) || 1;

function loadOpts(tplId) {
  const tpl = TEMPLATES[tplId];
  const saved = JSON.parse(localStorage.getItem("blattwerk:opts:" + tplId) || "{}");
  const opts = {};
  for (const o of tpl.options) opts[o.key] = saved[o.key] !== undefined ? saved[o.key] : o.default;
  return opts;
}
function saveOpts(tplId, opts) {
  localStorage.setItem("blattwerk:tpl", tplId);
  localStorage.setItem("blattwerk:opts:" + tplId, JSON.stringify(opts));
}

/* pastel card fills — passive, cycled per card; yellow stays reserved for actions */
const CARD_FILLS = ["var(--deko-yellow)", "var(--deko-blue)", "var(--deko-green)"];

function buildPicker() {
  const box = $("tpl-cards");
  box.innerHTML = "";
  Object.entries(TEMPLATES).forEach(([id, t], i) => {
    const input = el("input");
    input.type = "radio";
    input.name = "tpl";
    input.id = "tpl-" + id;
    input.checked = id === activeTpl;
    input.addEventListener("change", () => { activeTpl = id; rollDeko(); buildOptions(); updateDice(); update(); });

    const card = el("label", "tpl-card");
    card.htmlFor = input.id;
    card.style.setProperty("--card-fill", CARD_FILLS[i % CARD_FILLS.length]);
    const glyph = el("span", "tpl-glyph");
    glyph.textContent = t.glyph || t.name.slice(0, 2);
    const name = el("span", "tpl-name");
    name.textContent = t.name;
    card.append(glyph, name);

    box.append(input, card);
  });
}

function buildOptions() {
  const tpl = TEMPLATES[activeTpl];
  $("tpl-desc").textContent = tpl.description;
  const box = $("opts");
  box.innerHTML = "";
  const opts = loadOpts(activeTpl);

  let numberRow = null; // pair up consecutive number fields side by side
  for (const o of tpl.options) {
    const field = el("div", "field");
    const label = el("label");
    label.textContent = o.label;
    label.htmlFor = "opt-" + o.key;
    field.appendChild(label);

    let input;
    if (o.type === "select") {
      input = el("select");
      for (const c of o.choices) {
        const oe = el("option");
        oe.value = c.value; oe.textContent = c.label;
        input.appendChild(oe);
      }
      input.value = opts[o.key];
    } else {
      input = el("input");
      input.type = o.type;
      if (o.min !== undefined) input.min = o.min;
      if (o.max !== undefined) input.max = o.max;
      input.value = opts[o.key];
    }
    input.id = "opt-" + o.key;
    input.dataset.key = o.key;
    input.dataset.type = o.type;
    input.addEventListener("input", update);
    field.appendChild(input);

    if (o.type === "number") {
      if (!numberRow) { numberRow = el("div", "field-row"); box.appendChild(numberRow); }
      numberRow.appendChild(field);
    } else {
      numberRow = null;
      box.appendChild(field);
    }
  }
}

function readOpts() {
  const opts = {};
  for (const input of $("opts").querySelectorAll("[data-key]")) {
    opts[input.dataset.key] =
      input.dataset.type === "number" ? (parseInt(input.value, 10) || 0) : input.value;
  }
  return opts;
}

function buildSheet(tpl, opts, templateRng) {
  const sheet = el("div", "sheet");

  // shell-owned header: Name (left) · Datum (right) · Titel
  const head = el("div", "sheet-head");
  const name = el("div", "write-line write-name");
  name.appendChild(Object.assign(el("span"), { textContent: "Name:" }));
  name.appendChild(el("span", "rule"));
  const date = el("div", "write-line write-date");
  date.appendChild(Object.assign(el("span"), { textContent: "Datum:" }));
  date.appendChild(el("span", "rule"));
  head.append(name, date);
  sheet.appendChild(head);

  if (opts.title) {
    const title = el("div", "sheet-title");
    title.textContent = opts.title;
    sheet.appendChild(title);
  }

  sheet.appendChild(tpl.render(opts, { ...CTX, rng: templateRng }));
  return sheet;
}

function renderSheets() {
  const tpl = TEMPLATES[activeTpl];
  const opts = readOpts();
  saveOpts(activeTpl, opts);

  const scaler = $("scaler");
  scaler.innerHTML = "";

  // one meta stream draws a distinct sub-seed per page, so the same dekoSeed +
  // pageCount always reproduces the identical N-page set; XOR still keeps each
  // page's template stream distinct from its own Schmuck stream (per-sheet rule)
  const metaRng = mulberry32(dekoSeed);
  const sheets = [];
  for (let i = 0; i < pageCount; i++) {
    const pageSeed = Math.floor(metaRng() * 4294967296);
    const sheet = buildSheet(tpl, opts, mulberry32(pageSeed ^ 0x9E3779B9));
    scaler.appendChild(sheet); // attach before renderDeko — it measures live layout
    renderDeko(sheet, mulberry32(pageSeed));
    sheets.push(sheet);
  }

  // screen-only guard: does every page still fit one A4 page?
  // sheets grow with their content (min-height), so compare against fixed A4 height
  const a4h = parseFloat(getComputedStyle(sheets[0]).minHeight);
  $("warn").classList.toggle("show", sheets.some((s) => s.offsetHeight > a4h + 1));
}

/* true-size preview, scaled down only when the window is narrower than A4;
   stacked pages scale together so the on-screen preview matches print exactly */
function fitPreview() {
  const stage = document.querySelector(".stage");
  const scaler = $("scaler");
  const sheets = scaler.querySelectorAll(".sheet");
  const a4px = sheets[0].offsetWidth;
  const scale = Math.min(1, stage.clientWidth / a4px);
  scaler.style.transform = "scale(" + scale + ")";
  const first = sheets[0].getBoundingClientRect();
  const last = sheets[sheets.length - 1].getBoundingClientRect();
  scaler.style.height = ((last.bottom - first.top) * scale) + "px";
}

function update() { renderSheets(); fitPreview(); }

/* 🎲 also re-rolls random templates, so it only disables
   when neither Schmuck nor the active template uses the roll */
function updateDice() { $("dice").disabled = !dekoOn && !TEMPLATES[activeTpl].random; }

buildPicker();
buildOptions();
$("deko-on").checked = dekoOn;
$("pages").value = pageCount;
updateDice();
update();
window.addEventListener("resize", fitPreview);
$("print").addEventListener("click", () => window.print());
$("dice").addEventListener("click", () => {
  rollDeko();
  update();
  const d = $("dice");
  d.classList.remove("rolling");
  void d.offsetWidth; // restart the roll animation on rapid clicks
  d.classList.add("rolling");
});
$("deko-on").addEventListener("change", (e) => {
  dekoOn = e.target.checked;
  localStorage.setItem("blattwerk:deko", dekoOn ? "1" : "0");
  updateDice();
  update();
});
$("pages").addEventListener("input", () => {
  pageCount = parseInt($("pages").value, 10) || 1;
  localStorage.setItem("blattwerk:pages", pageCount);
  update();
});
</script>

</body>
</html>
